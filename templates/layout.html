<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevBurger - Flex & Grid 2025</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Oswald:wght@500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
   
    <link rel="stylesheet" 
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=add_shopping_cart" />

    <link rel="stylesheet" 
          href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=shopping_cart" />

    


<!-- Incluir os links para CSS (pode ter mais arquivos ou arquivos com nomes diferentes) -->

    {% block css_adicional %}
    {% endblock %}
    
    <link rel="stylesheet" href="{{ url_for('static', filename = 'src/css/reset.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename = 'src/css/variables.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename = 'src/css/main.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename = 'src/css/media.css') }}" />
    


  </head>
  <body>

  <!-- Header e Navbar -->
    <header class="header">
      <div class="header__container">
     
        <a href="#" class="header__logo">DevBurger</a>

        <nav class="header__nav">
          <ul class="header__menu">
            <li class="header__item">
              <a href="#" class="header__link">Home</a>
            </li>
            <li class="header__item">
              <a href="#menu" class="header__link">Cardápio</a>
            </li>
            <li class="header__item">
              <a href="#" class="header__link">Sobre</a>
            </li>
            <li class="header__item">
              <a href="#" class="header__link">Contato</a>
            </li>
          </ul>
        </nav>

        <button class="header__cart-btn" onclick="toggleCart()">
          <span class="material-symbols-outlined">shopping_cart</span>
        </button>

        <a href="/cadastro", methods="POST", style="gap: 10px;"><button class="btn_login">login</button></a>

      </div>
    </header>

      {% block conteudo %} 
        Aqui é onde vai o conteudo de site 
      {% endblock %}
    
<!-- Rodapé -->
    <footer class="footer">
      <p class="footer__text">
        DevBurger © 2025. Todos os direitos reservados.
      </p>
    </footer>

     

  </body>
</html>
